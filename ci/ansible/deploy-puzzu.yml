---
# Per-push deploy, run inside the runner with the scoped kubeconfig.
- name: Deploy puzzu
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ns: arcade
    repo_root: "{{ playbook_dir }}/../.."
    ingress_host: "{{ lookup('env', 'INGRESS_HOST') }}"
  environment:
    KUBECONFIG: "{{ lookup('env', 'KUBECONFIG') }}"
  tasks:
    - name: Rebuild static-site ConfigMap
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n {{ ns }} create configmap puzzu-html \
          --from-file=index.html={{ repo_root }}/index.html \
          --from-file=engine.js={{ repo_root }}/engine.js \
          --dry-run=client -o yaml | kubectl apply -f -
      args: { executable: /bin/bash }

    - name: Rebuild API source ConfigMap
      ansible.builtin.shell: |
        set -o pipefail
        kubectl -n {{ ns }} create configmap puzzu-api-src \
          --from-file=engine.js={{ repo_root }}/engine.js \
          --from-file=server.js={{ repo_root }}/server/server.js \
          --from-file=package.json={{ repo_root }}/server/package.json \
          --dry-run=client -o yaml | kubectl apply -f -
      args: { executable: /bin/bash }

    - name: Apply manifests
      ansible.builtin.command: >
        kubectl apply
        -f {{ repo_root }}/k8s/11-nfs-pvc.yaml
        -f {{ repo_root }}/k8s/30-api-deployment.yaml
        -f {{ repo_root }}/k8s/31-api-service.yaml

    - name: Apply ingress route
      ansible.builtin.shell: |
        set -o pipefail
        cat <<'YAML' | kubectl apply -f -
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: puzzu-api
          namespace: {{ ns }}
        spec:
          entryPoints: [websecure]
          routes:
            - kind: Rule
              match: Host(`{{ ingress_host }}`) && PathPrefix(`/api`)
              priority: 100
              services:
                - { name: puzzu-api, port: 80 }
          tls:
            certResolver: letsencrypt
        YAML
      args: { executable: /bin/bash }

    - name: Roll deployments
      ansible.builtin.command: kubectl -n {{ ns }} rollout restart deploy/puzzu deploy/puzzu-api

    - name: Wait for the API
      ansible.builtin.command: kubectl -n {{ ns }} rollout status deploy/puzzu-api --timeout=120s
