<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Puzzu-Bobboru 🫧</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap');

    :root {
      --bg:        #0d0d1a;
      --panel:     #13132b;
      --accent:    #ff6bcb;
      --accent2:   #6bf8ff;
      --accent3:   #ffe66b;
      --text:      #f0eeff;
      --shadow:    rgba(255,107,203,0.4);
      --glow2:     rgba(107,248,255,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 45% 45%, rgba(107,248,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 75% 15%, rgba(255,107,203,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2.5vw, 18px);
      color: var(--accent);
      text-shadow: 0 0 20px var(--shadow), 0 0 40px var(--shadow);
      letter-spacing: 2px;
      margin-bottom: 4px;
      z-index: 1;
    }

    .subtitle {
      font-size: 11px;
      color: var(--accent2);
      margin-bottom: 8px;
      opacity: 0.8;
      z-index: 1;
      font-style: italic;
    }

    .game-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .side-panel {
      width: 104px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-box {
      background: var(--panel);
      border: 1px solid rgba(107,248,255,0.2);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      box-shadow: 0 0 12px var(--glow2);
    }

    .panel-box .label {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--accent2);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .panel-box .value {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: var(--accent3);
      text-shadow: 0 0 10px rgba(255,230,107,0.6);
    }

    .lb-list { list-style: none; text-align: left; margin: 0; padding: 0; }
    .lb-list li {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      letter-spacing: 0.5px;
    }
    .lb-list .lb-ini { color: var(--accent2); }
    .lb-empty { font-family: 'Press Start 2P', monospace; font-size: 6px; color: rgba(240,238,255,0.4); }

    canvas#game {
      display: block;
      border-radius: 12px;
      border: 2px solid rgba(255,107,203,0.3);
      box-shadow:
        0 0 30px var(--shadow),
        0 0 60px rgba(255,107,203,0.1),
        inset 0 0 30px rgba(0,0,0,0.5);
      cursor: crosshair;
      max-width: calc(100vw - 140px);
      max-height: calc(100vh - 160px);
      width: auto;
      height: auto;
    }

    .btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.15s;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #c84fa0);
      color: white;
      box-shadow: 0 0 15px var(--shadow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--shadow); }

    .btn-secondary {
      background: var(--panel);
      color: var(--accent2);
      border: 1px solid var(--accent2);
    }
    .btn-secondary:hover { background: rgba(107,248,255,0.1); }

    #message {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--accent3);
      text-align: center;
      min-height: 16px;
      text-shadow: 0 0 10px rgba(255,230,107,0.6);
      z-index: 1;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(13,13,26,0.92);
      border-radius: 12px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      padding: 12px;
    }
    #overlay.show { display: flex; }

    #overlay-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 3vw, 20px);
      color: var(--accent);
      text-shadow: 0 0 20px var(--shadow);
      text-align: center;
      line-height: 1.8;
    }
    #overlay-sub { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--accent2); text-align: center; }
    .canvas-wrap { position: relative; }

    #initials-entry { display: none; flex-direction: column; align-items: center; gap: 10px; }
    #initials-entry.show { display: flex; }
    .ini-prompt { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--accent3); }
    .ini-slots { display: flex; gap: 10px; }
    .ini-slot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .ini-char {
      font-family: 'Press Start 2P', monospace;
      font-size: 22px;
      width: 34px; height: 40px;
      line-height: 40px; text-align: center;
      color: var(--text);
      background: rgba(107,248,255,0.06);
      border: 2px solid rgba(107,248,255,0.25);
      border-radius: 8px;
    }
    .ini-slot.sel .ini-char { border-color: var(--accent); color: var(--accent3); box-shadow: 0 0 14px var(--shadow); }
    .ini-arrow {
      font-family: 'Press Start 2P', monospace; font-size: 8px;
      width: 34px; padding: 4px 0; cursor: pointer;
      background: var(--panel); color: var(--accent2);
      border: 1px solid rgba(107,248,255,0.3); border-radius: 6px;
    }
    .ini-arrow:active { background: rgba(107,248,255,0.15); }

    #overlay-board { display: none; width: 240px; max-width: 90%; }
    #overlay-board.show { display: block; }
    #overlay-board ol { list-style: none; margin: 8px 0; padding: 0; }
    #overlay-board li {
      font-family: 'Press Start 2P', monospace; font-size: 8px;
      display: flex; justify-content: space-between; gap: 8px;
      padding: 3px 4px; color: var(--text); border-radius: 4px;
    }
    #overlay-board li.me { color: var(--accent3); background: rgba(255,230,107,0.08); text-shadow: 0 0 8px rgba(255,230,107,0.6); }
    #overlay-board .ob-ini { color: var(--accent2); }

    #aim-zone {
      display: none;
      width: 100%;
      height: 60px;
      margin-top: 6px;
      background: rgba(255,107,203,0.06);
      border: 1px solid rgba(255,107,203,0.2);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      z-index: 1;
      touch-action: none;
      position: relative;
      overflow: hidden;
    }
    #aim-zone-label {
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      color: rgba(255,107,203,0.5); pointer-events: none; letter-spacing: 1px;
    }
    #aim-thumb {
      position: absolute; width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,107,203,0.25); border: 2px solid rgba(255,107,203,0.6);
      pointer-events: none; display: none; transform: translate(-50%, -50%);
    }

    @media (hover: none) and (pointer: coarse) {
      #aim-zone { display: flex; }
      canvas#game { cursor: default; }
    }

    /* full leaderboard (top 20) + arcade rows */
    #ranks-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(13,13,26,0.95); border-radius: 12px;
      flex-direction: column; align-items: center; justify-content: flex-start;
      gap: 10px; padding: 14px 10px; z-index: 11;
    }
    #ranks-overlay.show { display: flex; }
    #ranks-title {
      font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--accent3);
      text-shadow: 0 0 12px rgba(255,230,107,0.6); margin-bottom: 2px;
    }
    #ranks-list { list-style: none; margin: 0; padding: 0 2px; width: 100%;
      max-height: calc(100% - 64px); overflow-y: auto; }
    #overlay-board ol { max-height: 280px; overflow-y: auto; }
    #ranks-list li, #overlay-board li {
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      display: flex; align-items: center; gap: 8px; padding: 4px 6px;
      color: var(--text); border-radius: 4px;
    }
    #ranks-list li:nth-child(even), #overlay-board li:nth-child(even) { background: rgba(255,255,255,0.03); }
    .rk { width: 44px; color: var(--accent2); }
    .ini { flex: 1; color: var(--accent); letter-spacing: 1px; }
    .sc { color: var(--accent3); }
    .rank-1 .rk { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.7); }
    .rank-2 .rk { color: #d8d8e0; }
    .rank-3 .rk { color: #cd7f32; }
    li.me { background: rgba(255,230,107,0.10); text-shadow: 0 0 8px rgba(255,230,107,0.6); }
    .lb-empty2 { font-family: 'Press Start 2P', monospace; font-size: 8px; color: rgba(240,238,255,0.4); padding: 14px; }

    /* power tiles (hold, and future slots) */
    .power-tile { cursor: pointer; user-select: none; transition: all 0.12s; }
    .power-tile:hover { border-color: var(--accent); box-shadow: 0 0 14px var(--shadow); }
    .power-tile:active { transform: translateY(1px); }
    .power-tile.locked { opacity: 0.55; cursor: default; }
    .power-tile.locked:hover { border-color: rgba(107,248,255,0.2); box-shadow: 0 0 12px var(--glow2); }
    #hold-canvas { display: block; margin: 2px auto 0; }

    /* combo box highlight */
    #combo-box.hot { border-color: var(--accent2); box-shadow: 0 0 16px var(--glow2); }
    #combo-box.hot .value { color: var(--accent2); text-shadow: 0 0 10px var(--accent2); }

    /* leaderboard tabs */
    #ranks-tabs { display: flex; gap: 8px; margin-bottom: 2px; }
    .rtab {
      font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 6px 10px;
      border-radius: 6px; cursor: pointer; letter-spacing: 1px;
      background: var(--panel); color: rgba(240,238,255,0.5);
      border: 1px solid rgba(107,248,255,0.2);
    }
    .rtab.active { color: var(--accent3); border-color: var(--accent3); box-shadow: 0 0 10px rgba(255,230,107,0.3); }
  </style>
</head>
<body>

<h1>🫧 PUZZU-BOBBORU</h1>

<div class="game-wrap">
  <div class="side-panel">
    <div class="panel-box power-tile" id="hold-tile" onclick="doHold()" title="Hold (H)">
      <div class="label">HOLD</div>
      <canvas id="hold-canvas" width="44" height="44"></canvas>
    </div>
    <div class="panel-box">
      <div class="label">SCORE</div>
      <div class="value" id="score-display">0</div>
    </div>
    <div class="panel-box">
      <div class="label">SHOTS</div>
      <div class="value" id="shots-display">0</div>
    </div>
    <div class="panel-box" id="combo-box">
      <div class="label">COMBO</div>
      <div class="value" id="combo-display">—</div>
    </div>
    <div class="panel-box">
      <div class="label">HIGH SCORES</div>
      <ul class="lb-list" id="lb-list"><li class="lb-empty">…</li></ul>
    </div>
    <button class="btn btn-primary" onclick="initGame()">NEW</button>
    <button class="btn btn-secondary" id="save-btn" onclick="doSave()">💾 SAVE</button>
    <button class="btn btn-secondary" id="resume-btn" onclick="doResume()" style="display:none">↺ RESUME</button>
    <button class="btn btn-secondary" id="sfx-btn" onclick="toggleMute()">🔊 SFX</button>
    <button class="btn btn-secondary" id="ranks-btn" onclick="openRanks()">🏆 RANKS</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="game" width="320" height="480"></canvas>
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-sub"></div>

      <div id="initials-entry">
        <div class="ini-prompt">ENTER YOUR INITIALS</div>
        <div class="ini-slots" id="ini-slots"></div>
        <button class="btn btn-primary" style="width:160px" id="ini-submit">SUBMIT</button>
      </div>

      <div id="overlay-board">
        <div class="ini-prompt" style="text-align:center">TOP SCORES</div>
        <ol id="overlay-board-list"></ol>
      </div>

      <button class="btn btn-primary" style="width:160px" id="play-again" onclick="initGame()">PLAY AGAIN</button>
    </div>
    <div id="ranks-overlay">
      <div id="ranks-title">HIGH SCORES</div>
      <div id="ranks-tabs">
        <button class="rtab active" id="rtab-score" onclick="openRanks('score')">SCORE</button>
        <button class="rtab" id="rtab-combo" onclick="openRanks('combo')">COMBO</button>
      </div>
      <ol id="ranks-list"></ol>
      <button class="btn btn-primary" style="width:160px" onclick="closeRanks()">CLOSE</button>
    </div>
  </div>
</div>

<div id="aim-zone">
  <span id="aim-zone-label">drag to aim · lift to shoot</span>
  <div id="aim-thumb"></div>
</div>

<div id="message">aim and tap to shoot!</div>

<script src="engine.js"></script>
<script>
const API_BASE = ''; // same-origin
const C = PuzzuEngine.CONST;
const colorHex = PuzzuEngine.colorHex;

let canvas, ctx;
let game = null;           // PuzzuEngine instance
let session = null;        // { sid, seed, iat, sig } from /api/session, or null offline
let projectile = null;     // { points, idx, color, mx, my } during flight animation
let mouseX = 160, mouseY = 240;
let animId = null;
let muted = false;
let dropping = false;
let particles = [];        // pop bursts
let fallers = [];          // cascading orphan bubbles
let floaters = [];         // rising "+N" point numbers
let comboFlash = null;     // big combo callout
let dropShake = 0;         // impulse when a row drops

/* ---------- session + lifecycle ---------- */
async function newSession() {
  try {
    const r = await fetch(API_BASE + '/api/session', { method: 'POST' });
    if (!r.ok) throw new Error('session ' + r.status);
    session = await r.json();
    return session.seed >>> 0;
  } catch (e) {
    session = null; // offline / local dev — playable, but scores won't save
    return (Math.floor(Math.random() * 0xffffffff)) >>> 0;
  }
}

async function initGame() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');

  if (!window._wired) {
    window._wired = true;
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('click', onShoot);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onCanvasTouch(e.touches[0]); }, { passive: false });
    canvas.addEventListener('touchmove',  (e) => { e.preventDefault(); onCanvasTouch(e.touches[0]); }, { passive: false });
    canvas.addEventListener('touchend',   (e) => { e.preventDefault(); onShoot(); }, { passive: false });
    wireAimZone();
    wireInitials();
    document.addEventListener('keydown', onKey);
    loadLeaderboard();
    updateSaveUI();
  }

  hideOverlay();
  projectile = null; dropping = false;
  particles = []; fallers = []; floaters = []; comboFlash = null; dropShake = 0;

  const seed = await newSession();
  game = new PuzzuEngine(seed);
  document.getElementById('message').textContent =
    session === null ? 'aim and tap! (offline — not saving)' : 'aim and tap to shoot!';
  updateHUD();
  if (animId) cancelAnimationFrame(animId);
  loop();
}

/* ---------- input ---------- */
function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (e.clientY - rect.top)  * (canvas.height / rect.height);
}
function onCanvasTouch(t) {
  const rect = canvas.getBoundingClientRect();
  mouseX = (t.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (t.clientY - rect.top)  * (canvas.height / rect.height);
  if (mouseY > C.SHOOTER_Y - 30) mouseY = C.SHOOTER_Y - 30;
}
function wireAimZone() {
  const aimZone = document.getElementById('aim-zone');
  const aimThumb = document.getElementById('aim-thumb');
  const place = (t) => {
    const rect = aimZone.getBoundingClientRect();
    aimThumb.style.left = (t.clientX - rect.left) + 'px';
    aimThumb.style.top  = (t.clientY - rect.top)  + 'px';
  };
  const aim = (t) => {
    const rect = aimZone.getBoundingClientRect();
    const relX = (t.clientX - rect.left) / rect.width;
    const relY = (t.clientY - rect.top)  / rect.height;
    mouseX = relX * canvas.width;
    mouseY = C.SHOOTER_Y - 20 - (1 - relY) * (C.SHOOTER_Y - 60);
  };
  aimZone.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; place(t); aimThumb.style.display = 'block'; aim(t); }, { passive: false });
  aimZone.addEventListener('touchmove',  (e) => { e.preventDefault(); const t = e.touches[0]; place(t); aim(t); }, { passive: false });
  aimZone.addEventListener('touchend',   (e) => { e.preventDefault(); aimThumb.style.display = 'none'; onShoot(); }, { passive: false });
}

function onShoot() {
  if (!game || game.over || projectile || dropping) return;
  const mx = mouseX, my = mouseY;
  if (my >= C.SHOOTER_Y) return; // must aim upward
  const tr = game.trace(mx, my);
  if (!tr) return;
  projectile = { points: tr.points, idx: 0, color: game.current, mx, my, lastX: C.SHOOTER_X };
  blip(330, 0.05, 'sine', 0.07);
}

/* advance the flight animation, then commit the shot to the engine */
function stepProjectile() {
  if (!projectile) return;
  projectile.idx += C.SHOT_SPEED; // points are 1px-per-step; skip ahead for speed
  if (projectile.idx < projectile.points.length - 1) {
    const p = projectile.points[Math.min(projectile.idx, projectile.points.length - 1)];
    if ((projectile.lastX - C.R < 0.5 && p.x - C.R < 0.5) === false) { /* noop */ }
    // wall tick: x pinned to an edge
    if (p.x <= C.R + 0.01 || p.x >= C.BOARD_W - C.R - 0.01) {
      if (!projectile._ticked || projectile._ticked !== Math.round(p.x)) { blip(200, 0.03, 'square', 0.04); projectile._ticked = Math.round(p.x); }
    }
    projectile.lastX = p.x;
    return;
  }
  // land it — engine recomputes identically and records the move
  const { mx, my } = projectile;
  projectile = null;
  const ev = game.shoot(mx, my); // records move into game.moves
  if (ev.lost) { document.getElementById('message').textContent = 'lost that one! 🫧'; blip(160, 0.1, 'sine', 0.08); }
  else if (ev.gained > 0) blip(500 + Math.min(ev.gained, 400), 0.14, 'triangle', 0.16);
  else blip(240, 0.04, 'sine', 0.06);
  spawnFX(ev);
  updateHUD();

  if (ev.win)  { endGame(true);  return; }
  if (ev.lose) { endGame(false); return; }
  if (ev.dropped) { dropping = true; setTimeout(() => { dropping = false; }, 120); }
}

/* ---------- render ---------- */
function loop() { stepProjectile(); updateFX(); draw(); animId = requestAnimationFrame(loop); }

function draw() {
  ctx.clearRect(0, 0, 320, 480);
  const bg = ctx.createLinearGradient(0, 0, 0, 480);
  bg.addColorStop(0, '#0d0d1a'); bg.addColorStop(1, '#13132b');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, 320, 480);

  // drop telegraph: the board shakes harder as the next row nears
  let tension = 0;
  if (game && !game.over) {
    const untilDrop = C.DROP_EVERY - (game.shots % C.DROP_EVERY);
    if (untilDrop <= 3) tension = (4 - untilDrop) / 3;
  }
  const amp = tension * 2.2 + dropShake;
  const jx = amp ? (Math.random() - 0.5) * 2 * amp : 0;
  const jy = amp ? (Math.random() - 0.5) * 2 * amp : 0;

  ctx.save();
  ctx.translate(jx, jy);

  ctx.strokeStyle = 'rgba(255,107,203,0.15)'; ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]); ctx.beginPath();
  ctx.moveTo(0, C.SHOOTER_Y - C.R - 6); ctx.lineTo(320, C.SHOOTER_Y - C.R - 6); ctx.stroke();
  ctx.setLineDash([]);

  if (game) {
    for (let r = 0; r < C.ROWS; r++) {
      const cols = game.rowCols(r);
      for (let c = 0; c < cols; c++) {
        if (game.grid[r] && game.grid[r][c] != null) {
          const { x, y } = game.colRow(c, r);
          drawBubble(ctx, x, y, C.R, colorHex(game.grid[r][c]));
        }
      }
    }
    if (!projectile && !game.over) drawTrajectory();
    if (projectile) {
      const p = projectile.points[Math.min(projectile.idx, projectile.points.length - 1)];
      drawBubble(ctx, p.x, p.y, C.R, colorHex(projectile.color));
    } else if (!game.over) {
      drawBubble(ctx, C.SHOOTER_X, C.SHOOTER_Y, C.R, colorHex(game.current));
    }
    drawOnDeck();
  }

  drawFX();

  ctx.strokeStyle = 'rgba(255,107,203,0.3)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(160, C.SHOOTER_Y, 28, Math.PI, 0); ctx.stroke();
  drawAimSpike();

  ctx.restore();

  if (tension > 0) {
    const g = ctx.createLinearGradient(0, 0, 0, 44);
    g.addColorStop(0, `rgba(255,70,70,${0.4 * tension})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 320, 44);
  }
}

function drawOnDeck() {
  if (game.over) return;
  const x = C.SHOOTER_X + 50, y = C.SHOOTER_Y + 2, r = C.R - 4;
  ctx.font = '6px "Press Start 2P", monospace';
  ctx.fillStyle = 'rgba(107,248,255,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', x, y - r - 6);
  ctx.strokeStyle = 'rgba(107,248,255,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x, y, r + 4, 0, Math.PI * 2); ctx.stroke();
  drawBubble(ctx, x, y, r, colorHex(game.next));
}

// rotating spike on the cannon arc, pointing where you're aiming
function drawAimSpike() {
  if (!game || game.over) return;
  let ang;
  if (projectile) {
    const p = projectile.points[Math.min(projectile.idx, projectile.points.length - 1)];
    ang = Math.atan2(p.y - C.SHOOTER_Y, p.x - C.SHOOTER_X);
  } else {
    const dx = mouseX - C.SHOOTER_X, dy = mouseY - C.SHOOTER_Y;
    if (dy >= 0) return;
    ang = Math.atan2(dy, dx);
  }
  ctx.save();
  ctx.translate(C.SHOOTER_X, C.SHOOTER_Y);
  ctx.rotate(ang);
  ctx.fillStyle = 'rgba(255,230,107,0.9)';
  ctx.beginPath();
  ctx.moveTo(38, 0); ctx.lineTo(26, -5); ctx.lineTo(26, 5);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// the HOLD power tile (top-left of the UI). A generic power slot.
let holdCtx = null;
function drawHoldTile() {
  if (!holdCtx) { const hc = document.getElementById('hold-canvas'); if (!hc) return; holdCtx = hc.getContext('2d'); }
  holdCtx.clearRect(0, 0, 44, 44);
  if (!game) return;
  const live = !game.holdLock && !game.over;
  if (game.held !== null) {
    holdCtx.save(); if (!live) holdCtx.globalAlpha = 0.45;
    drawBubble(holdCtx, 22, 22, 13, colorHex(game.held));
    holdCtx.restore();
  } else {
    holdCtx.strokeStyle = live ? 'rgba(255,107,203,0.4)' : 'rgba(255,107,203,0.15)';
    holdCtx.lineWidth = 1; holdCtx.setLineDash([3, 3]);
    holdCtx.beginPath(); holdCtx.arc(22, 22, 12, 0, Math.PI * 2); holdCtx.stroke();
    holdCtx.setLineDash([]);
  }
  document.getElementById('hold-tile').classList.toggle('locked', game.holdLock || game.over);
}

function doHold() {
  if (!game || game.over || projectile || dropping || game.holdLock) return;
  game.hold();
  blip(420, 0.06, 'triangle', 0.08);
  updateHUD();
}

function drawTrajectory() {
  const tr = game.trace(mouseX, mouseY);
  if (!tr) return;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  const pts = tr.points;
  let drawn = 0;
  for (let i = 0; i < pts.length && drawn < 34; i += 3) {
    const s = 3 - drawn * 0.07; if (s <= 0) break;
    ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, Math.max(s, 0.5), 0, Math.PI * 2); ctx.fill();
    drawn++;
  }
}

function drawBubble(context, x, y, r, color) {
  const glow = context.createRadialGradient(x, y, r * 0.1, x, y, r * 1.4);
  glow.addColorStop(0, color + '55'); glow.addColorStop(1, 'transparent');
  context.fillStyle = glow;
  context.beginPath(); context.arc(x, y, r * 1.4, 0, Math.PI * 2); context.fill();

  const grad = context.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  grad.addColorStop(0, lighten(color, 60)); grad.addColorStop(0.6, color); grad.addColorStop(1, darken(color, 40));
  context.fillStyle = grad;
  context.beginPath(); context.arc(x, y, r - 1, 0, Math.PI * 2); context.fill();

  context.fillStyle = 'rgba(255,255,255,0.35)';
  context.beginPath(); context.ellipse(x - r * 0.25, y - r * 0.28, r * 0.3, r * 0.18, -0.5, 0, Math.PI * 2); context.fill();

  context.strokeStyle = 'rgba(255,255,255,0.15)'; context.lineWidth = 1;
  context.beginPath(); context.arc(x, y, r - 1, 0, Math.PI * 2); context.stroke();
}

function lighten(hex, amt) { return shiftColor(hex, amt); }
function darken(hex, amt)  { return shiftColor(hex, -amt); }
function shiftColor(hex, amt) {
  const n = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (n >> 16) + amt));
  const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amt));
  const b = Math.min(255, Math.max(0, (n & 0xff) + amt));
  return `rgb(${r},${g},${b})`;
}

function updateHUD() {
  document.getElementById('score-display').textContent = game ? game.score : 0;
  document.getElementById('shots-display').textContent = game ? game.shots : 0;
  const c = game && game.combo > 1 ? game.combo : 0;
  document.getElementById('combo-display').textContent = c ? 'x' + c : '—';
  document.getElementById('combo-box').classList.toggle('hot', c > 0);
  drawHoldTile();
  updateSaveUI();
}

/* ---------- game over: initials + submission ---------- */
const INI_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_';
let iniSlots = [0, 0, 0], iniSel = 0, iniActive = false;

function endGame(win) {
  if (win) { blip(523, 0.12); setTimeout(() => blip(659, 0.12), 120); setTimeout(() => blip(784, 0.2), 240); }
  else blip(130, 0.4, 'sine', 0.1);

  document.getElementById('overlay-title').textContent = win ? '🎉 YOU WIN!' : '💀 GAME OVER';
  document.getElementById('overlay-sub').textContent = 'SCORE  ' + game.score;
  document.getElementById('overlay-board').classList.remove('show');

  const canSubmit = session !== null && game.over;
  if (canSubmit) {
    iniSlots = [0, 0, 0]; iniSel = 0; iniActive = true;
    renderInitials();
    document.getElementById('initials-entry').classList.add('show');
    document.getElementById('play-again').style.display = 'none';
  } else {
    iniActive = false;
    document.getElementById('initials-entry').classList.remove('show');
    document.getElementById('play-again').style.display = '';
  }
  document.getElementById('overlay').classList.add('show');
}

function wireInitials() {
  document.getElementById('ini-submit').addEventListener('click', submitScore);
}
function renderInitials() {
  const wrap = document.getElementById('ini-slots');
  wrap.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const slot = document.createElement('div');
    slot.className = 'ini-slot' + (i === iniSel ? ' sel' : '');
    const up = document.createElement('div'); up.className = 'ini-arrow'; up.textContent = '▲';
    up.onclick = () => { iniSel = i; cycle(+1); };
    const ch = document.createElement('div'); ch.className = 'ini-char'; ch.textContent = INI_CHARS[iniSlots[i]];
    ch.onclick = () => { iniSel = i; renderInitials(); };
    const dn = document.createElement('div'); dn.className = 'ini-arrow'; dn.textContent = '▼';
    dn.onclick = () => { iniSel = i; cycle(-1); };
    slot.appendChild(up); slot.appendChild(ch); slot.appendChild(dn);
    wrap.appendChild(slot);
  }
}
function cycle(d) {
  iniSlots[iniSel] = (iniSlots[iniSel] + d + INI_CHARS.length) % INI_CHARS.length;
  renderInitials();
}
function onKey(e) {
  if (!iniActive && (e.key === 'h' || e.key === 'H')) { doHold(); return; }
  if (!iniActive) return;
  if (e.key === 'ArrowLeft')  { iniSel = (iniSel + 2) % 3; renderInitials(); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { iniSel = (iniSel + 1) % 3; renderInitials(); e.preventDefault(); }
  else if (e.key === 'ArrowUp')   { cycle(+1); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { cycle(-1); e.preventDefault(); }
  else if (e.key === 'Enter')     { submitScore(); e.preventDefault(); }
  else if (/^[a-zA-Z0-9]$/.test(e.key)) {
    const idx = INI_CHARS.indexOf(e.key.toUpperCase());
    if (idx >= 0) { iniSlots[iniSel] = idx; iniSel = Math.min(2, iniSel + 1); renderInitials(); }
  }
}

async function submitScore() {
  if (!iniActive || !session) return;
  iniActive = false;
  const initials = iniSlots.map((i) => INI_CHARS[i]).join('');
  document.getElementById('ini-submit').textContent = 'SENDING…';
  try {
    const r = await fetch(API_BASE + '/api/score', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sid: session.sid, seed: session.seed, iat: session.iat, sig: session.sig,
        moves: game.moves, initials,
      }),
    });
    const data = await r.json();
    document.getElementById('initials-entry').classList.remove('show');
    document.getElementById('play-again').style.display = '';
    document.getElementById('ini-submit').textContent = 'SUBMIT';
    if (r.ok && data.accepted) {
      showOverlayBoard(data.leaderboard, data.rank);
      renderLeaderboard(data.leaderboard);
      document.getElementById('overlay-sub').textContent =
        data.rank ? `RANK #${data.rank}  ·  ${data.score}` : `SCORE  ${data.score}`;
    } else {
      document.getElementById('overlay-sub').textContent = 'not saved: ' + (data.error || 'error');
    }
  } catch (e) {
    document.getElementById('initials-entry').classList.remove('show');
    document.getElementById('play-again').style.display = '';
    document.getElementById('ini-submit').textContent = 'SUBMIT';
    document.getElementById('overlay-sub').textContent = 'not saved (offline)';
  }
}

/* ---------- save / resume ---------- */
const SAVE_KEY = 'puzzu_save';
function setMsg(t) { document.getElementById('message').textContent = t; }
function updateSaveUI() {
  let has = false; try { has = !!localStorage.getItem(SAVE_KEY); } catch (e) {}
  // resume only from a fresh game — no scumming a run in progress
  const fresh = !game || (game.moves.length === 0 && !game.over);
  document.getElementById('resume-btn').style.display = (has && fresh) ? '' : 'none';
}
async function doSave() {
  if (!session) { setMsg('saving needs the server'); return; }
  if (!game || game.over || !game.moves.length) { setMsg('nothing to save yet'); return; }
  try {
    const r = await fetch(API_BASE + '/api/save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sid: session.sid, seed: session.seed, iat: session.iat, sig: session.sig, moves: game.moves }),
    });
    const data = await r.json();
    if (r.ok && data.uid) { try { localStorage.setItem(SAVE_KEY, data.uid); } catch (e) {} updateSaveUI(); setMsg('saved! resume anytime'); }
    else setMsg('save failed: ' + (data.error || 'error'));
  } catch (e) { setMsg('save failed (offline)'); }
}
async function doResume() {
  if (game && game.moves.length > 0 && !game.over) { setMsg('start a new game to resume'); return; }
  let uid = null; try { uid = localStorage.getItem(SAVE_KEY); } catch (e) {}
  if (!uid) { setMsg('no saved game'); return; }
  try {
    const r = await fetch(API_BASE + '/api/resume', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid }),
    });
    if (!r.ok) { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} updateSaveUI(); setMsg('save not found'); return; }
    const data = await r.json();
    session = { sid: data.sid, seed: data.seed, iat: data.iat, sig: data.sig };
    game = new PuzzuEngine(data.seed);
    for (const m of data.moves) { if (game.over) break; if (m && m.hold) game.hold(); else game.shoot(m.mx, m.my); }
    projectile = null; dropping = false;
    particles = []; fallers = []; floaters = []; comboFlash = null; dropShake = 0;
    hideOverlay();
    updateHUD();
    setMsg('resumed! aim and tap');
  } catch (e) { setMsg('resume failed (offline)'); }
}

/* ---------- leaderboard ---------- */
async function loadLeaderboard() {
  try {
    const r = await fetch(API_BASE + '/api/leaderboard');
    if (!r.ok) return;
    const data = await r.json();
    renderLeaderboard(data.leaderboard);
  } catch (e) { /* offline; leave the dots */ }
}
function renderLeaderboard(list) {
  const el = document.getElementById('lb-list');
  el.innerHTML = '';
  if (!list || !list.length) { el.innerHTML = '<li class="lb-empty">no scores yet</li>'; return; }
  list.slice(0, 8).forEach((e) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="lb-ini">${e.initials}</span><span>${e.score}</span>`;
    el.appendChild(li);
  });
}
function showOverlayBoard(list, myRank) {
  const box = document.getElementById('overlay-board');
  const ol = document.getElementById('overlay-board-list');
  ol.innerHTML = (list || []).slice(0, 20).map((e) => rankRow(e, 'score', myRank)).join('');
  box.classList.add('show');
}

/* ---------- juice: pops + cascades ---------- */
function spawnFX(ev) {
  const mult = ev.mult || 1;
  (ev.pops  || []).forEach((p) => {
    spawnBurst(p.x, p.y, p.color);
    floaters.push({ x: p.x, y: p.y, life: 0, max: 42, val: 10 * mult, color: '#ffffff' });
  });
  (ev.drops || []).forEach((d) => {
    fallers.push({ x: d.x, y: d.y, vx: (Math.random() - 0.5) * 1.6, vy: Math.random() * 0.8, r: C.R, color: d.color, alpha: 1 });
    floaters.push({ x: d.x, y: d.y, life: 0, max: 50, val: 20 * mult, color: '#ffe66b' });
  });
  if (ev.combo > 1) comboFlash = { combo: ev.combo, life: 0, max: 38 };
  if (ev.dropped) dropShake = 7;
}
function spawnBurst(x, y, color) {
  const n = 10;
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i) / n + Math.random() * 0.5;
    const sp = 1.4 + Math.random() * 2.6;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.6,
      life: 0, max: 16 + Math.random() * 14, size: 1.8 + Math.random() * 2.4, color });
  }
  particles.push({ ring: true, x, y, life: 0, max: 14, color });
}
function updateFX() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.life++;
    if (!p.ring) { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.vx *= 0.98; }
    if (p.life >= p.max) particles.splice(i, 1);
  }
  for (let i = fallers.length - 1; i >= 0; i--) {
    const f = fallers[i];
    f.vy += 0.45; f.x += f.vx; f.y += f.vy; f.alpha -= 0.014;
    if (f.y - f.r > 480 || f.alpha <= 0) fallers.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const fl = floaters[i]; fl.life++; fl.y -= 0.6;
    if (fl.life >= fl.max) floaters.splice(i, 1);
  }
  if (comboFlash) { comboFlash.life++; if (comboFlash.life >= comboFlash.max) comboFlash = null; }
  if (dropShake > 0) dropShake = Math.max(0, dropShake - 0.5);
}
function drawFX() {
  for (const f of fallers) {
    ctx.save(); ctx.globalAlpha = Math.max(0, f.alpha);
    drawBubble(ctx, f.x, f.y, f.r, f.color); ctx.restore();
  }
  for (const p of particles) {
    const t = p.life / p.max;
    ctx.save();
    if (p.ring) {
      ctx.globalAlpha = (1 - t) * 0.7; ctx.strokeStyle = p.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, C.R * (0.4 + t * 1.3), 0, Math.PI * 2); ctx.stroke();
    } else {
      ctx.globalAlpha = Math.max(0, 1 - t); ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.size * (1 - t * 0.5)), 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
  // rising point numbers
  ctx.textAlign = 'center';
  for (const fl of floaters) {
    const t = fl.life / fl.max;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - t);
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.fillStyle = fl.color;
    ctx.fillText('+' + fl.val, fl.x, fl.y);
    ctx.restore();
  }
  // combo callout
  if (comboFlash) {
    const t = comboFlash.life / comboFlash.max;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - t);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#6bf8ff';
    ctx.font = (12 + (1 - t) * 8) + 'px "Press Start 2P", monospace';
    ctx.fillText('COMBO x' + comboFlash.combo, 160, 70);
    ctx.restore();
  }
}

/* ---------- full leaderboard (top 20) ---------- */
function ord(n) { const s = ['TH','ST','ND','RD'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
function rankRow(e, type, myRank) {
  const cls = ['lb-row'];
  if (myRank && e.rank === myRank) cls.push('me');
  if (e.rank <= 3) cls.push('rank-' + e.rank);
  const metric = type === 'combo' ? 'x' + (e.combo || 0) : e.score;
  return `<li class="${cls.join(' ')}"><span class="rk">${ord(e.rank)}</span>` +
         `<span class="ini">${e.initials}</span><span class="sc">${metric}</span></li>`;
}
async function openRanks(type) {
  type = type === 'combo' ? 'combo' : 'score';
  document.getElementById('rtab-score').classList.toggle('active', type === 'score');
  document.getElementById('rtab-combo').classList.toggle('active', type === 'combo');
  document.getElementById('ranks-title').textContent = type === 'combo' ? 'BEST COMBOS' : 'HIGH SCORES';
  const ol = document.getElementById('ranks-list');
  ol.innerHTML = '<li class="lb-empty2">loading…</li>';
  document.getElementById('ranks-overlay').classList.add('show');
  try {
    const r = await fetch(API_BASE + '/api/leaderboard' + (type === 'combo' ? '?board=combo' : ''));
    const data = await r.json();
    const list = (data.leaderboard || []).slice(0, 20);
    ol.innerHTML = list.length ? list.map((e) => rankRow(e, type, null)).join('') : '<li class="lb-empty2">no scores yet</li>';
  } catch (e) { ol.innerHTML = '<li class="lb-empty2">offline</li>'; }
}
function closeRanks() { document.getElementById('ranks-overlay').classList.remove('show'); }

/* ---------- misc ---------- */
function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('initials-entry').classList.remove('show');
  document.getElementById('overlay-board').classList.remove('show');
  document.getElementById('ranks-overlay').classList.remove('show');
}

let _ac = null;
function blip(freq, dur = 0.08, type = 'sine', gain = 0.12) {
  if (muted) return;
  try {
    _ac = _ac || new (window.AudioContext || window.webkitAudioContext)();
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, _ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, _ac.currentTime + dur);
    o.connect(g); g.connect(_ac.destination);
    o.start(); o.stop(_ac.currentTime + dur);
  } catch (e) {}
}
function toggleMute() {
  muted = !muted;
  document.getElementById('sfx-btn').textContent = muted ? '🔇 SFX' : '🔊 SFX';
}

window.addEventListener('load', initGame);
</script>
